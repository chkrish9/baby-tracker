services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: babytracker
      POSTGRES_PASSWORD: babytracker
      POSTGRES_DB: babytracker
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babytracker -d babytracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Run Prisma migrations (one-shot, exits when done) ────────────────────
  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://babytracker:babytracker@db:5432/babytracker
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Express API server ────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://babytracker:babytracker@db:5432/babytracker
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002}
      NODE_ENV: production
      PORT: 4000
    volumes:
      # Persist uploaded files outside the container
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Next.js UI ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
    depends_on:
      - server

volumes:
  db_data:
  uploads_data:
